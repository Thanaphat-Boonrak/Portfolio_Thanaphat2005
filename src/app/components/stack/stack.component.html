<section id="stack" class="border-t border-border">
  <div class="max-w-4xl mx-auto px-6 py-20">
    <p class="font-mono text-xs text-accent mb-3">02 · stack</p>
    <h2 class="font-display text-2xl text-neutral-50 mb-10">Stack</h2>

    <div class="grid sm:grid-cols-3 gap-8">
      @for (col of columns; track col.title) {
        <div>
          <h3 class="font-mono text-xs uppercase tracking-wide text-accent mb-4">{{ col.title }}</h3>
          <ul class="space-y-2 text-sm text-neutral-400">
            @for (item of col.items; track item; let last = $last) {
              <li [class.border-b]="!last" [class.border-border]="!last" class="pb-2">{{ item }}</li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>
