<section id="projects" class="border-t border-border">
  <div class="max-w-4xl mx-auto px-6 py-20">
    <p class="font-mono text-xs text-accent mb-3">03 · projects</p>
    <h2 class="font-display text-2xl text-neutral-50 mb-10">Selected projects</h2>

    <div class="space-y-5">
      @for (project of projects; track project.name) {
        <div class="border border-border rounded-lg p-6 hover:border-accent/50 transition">
          <div class="flex flex-wrap justify-between items-start gap-3 mb-3">
            <h3 class="font-display text-lg text-neutral-50">{{ project.name }}</h3>
            <div class="flex gap-2 shrink-0 font-mono text-xs">
              @for (link of project.links; track link.url) {
                <a [href]="link.url" class="px-3 py-1.5 rounded border border-border text-neutral-400 hover:border-accent hover:text-accent transition">{{ link.label }}</a>
              }
            </div>
          </div>
          <p class="text-sm text-neutral-400 mb-4">{{ project.description }}</p>
          <div class="flex flex-wrap gap-2">
            @for (tag of project.tech; track tag) {
              <span class="font-mono text-xs px-2.5 py-1 rounded bg-accent/10 text-accent">{{ tag }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
